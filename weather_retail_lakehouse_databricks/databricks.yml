# This is a Databricks asset bundle definition for weather_retail_lakehouse_databricks.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: weather_retail_lakehouse_databricks
  uuid: 3bbabc46-8a47-4659-9b39-d01e4e74ebd4

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-ff2689c4-e54f.cloud.databricks.com
    variables:
      catalog: workspace
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-ff2689c4-e54f.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/manikumarkotipalli1234@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/manikumarkotipalli1234@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: manikumarkotipalli1234@gmail.com
        level: CAN_MANAGE
